<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Mario Style Game – Improved</title>
  <style>
    body {
      margin: 0;
      background: #1e1e1e;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: Arial, sans-serif;
    }
    canvas {
      background: linear-gradient(#6ec6ff, #cceeff);
      border: 3px solid white;
    }
    .info {
      position: absolute;
      top: 10px;
      left: 10px;
    }
  </style>
</head>
<body>

<div class="info">⬅ ➡ Move | Space Jump</div>
<canvas id="game" width="900" height="450"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// ================= PLAYER =================
const player = {
  x: 80,
  y: 0,
  w: 40,
  h: 40,
  vx: 0,
  vy: 0,
  speed: 6,
  jump: -16,
  gravity: 0.9,
  onGround: false
};

// ================= WORLD =================
const platforms = [
  { x: 0, y: 400, w: 2000, h: 50 },
  { x: 250, y: 300, w: 200, h: 20 },
  { x: 550, y: 230, w: 180, h: 20 },
  { x: 850, y: 160, w: 160, h: 20 },
  { x: 1200, y: 280, w: 220, h: 20 }
];

const coins = [
  { x: 300, y: 260, r: 8, taken: false },
  { x: 600, y: 190, r: 8, taken: false },
  { x: 900, y: 120, r: 8, taken: false },
  { x: 1250, y: 240, r: 8, taken: false }
];

let score = 0;

// ================= CAMERA =================
let cameraX = 0;

// ================= INPUT =================
const keys = {};
document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

// ================= UPDATE =================
function update() {
  // Horizontal movement
  player.vx = 0;
  if (keys["ArrowRight"]) player.vx = player.speed;
  if (keys["ArrowLeft"]) player.vx = -player.speed;

  // Jump
  if (keys["Space"] && player.onGround) {
    player.vy = player.jump;
    player.onGround = false;
  }

  // Apply physics
  player.vy += player.gravity;
  player.x += player.vx;
  player.y += player.vy;

  player.onGround = false;

  // Collision with platforms
  platforms.forEach(p => {
    if (
      player.x < p.x + p.w &&
      player.x + player.w > p.x &&
      player.y < p.y + p.h &&
      player.y + player.h > p.y
    ) {
      if (player.vy > 0) {
        player.y = p.y - player.h;
        player.vy = 0;
        player.onGround = true;
      }
    }
  });

  // Coins
  coins.forEach(c => {
    if (!c.taken) {
      let dx = (player.x + player.w / 2) - c.x;
      let dy = (player.y + player.h / 2) - c.y;
      let dist = Math.sqrt(dx * dx + dy * dy);
      if (dist < c.r + player.w / 2) {
        c.taken = true;
        score += 10;
      }
    }
  });

  // Fall reset
  if (player.y > canvas.height) {
    player.x = 80;
    player.y = 0;
    score = 0;
    coins.forEach(c => c.taken = false);
  }

  // Camera follows player
  cameraX = player.x - 200;
  if (cameraX < 0) cameraX = 0;
}

// ================= DRAW =================
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  ctx.save();
  ctx.translate(-cameraX, 0);

  // Platforms
  ctx.fillStyle = "#2ecc71";
  platforms.forEach(p => ctx.fillRect(p.x, p.y, p.w, p.h));

  // Coins
  coins.forEach(c => {
    if (!c.taken) {
      ctx.fillStyle = "gold";
      ctx.beginPath();
      ctx.arc(c.x, c.y, c.r, 0, Math.PI * 2);
      ctx.fill();
    }
  });

  // Player
  ctx.fillStyle = "#e74c3c";
  ctx.fillRect(player.x, player.y, player.w, player.h);

  ctx.restore();

  // UI
  ctx.fillStyle = "white";
  ctx.font = "18px Arial";
  ctx.fillText("Score: " + score, 20, 30);
}

// ================= LOOP =================
function gameLoop() {
  update();
  draw();
  requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
