<!DOCTYPE html>
<html>
<head>
<title>Pro Car Racing - Kamesh</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
margin: 0;
background: #0f172a;
display: flex;
flex-direction: column;
align-items: center;
color: white;
font-family: Arial;
}

h1 { margin: 10px; }

.info {
display: flex;
gap: 20px;
}

canvas {
background: #222;
border: 2px solid white;
margin-top: 10px;
}

/* Start Screen */
#startScreen {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.9);
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
z-index: 10;
}

/* Game Over */
#gameOver {
position: absolute;
top: 0;
left: 0;
width: 100%;
height: 100%;
background: rgba(0,0,0,0.9);
display: none;
flex-direction: column;
justify-content: center;
align-items: center;
z-index: 10;
}

/* Buttons */
button {
padding: 10px 20px;
margin: 5px;
font-size: 18px;
border: none;
background: lime;
border-radius: 5px;
}

/* Mobile controls */
.controls {
margin-top: 10px;
}
</style>

</head>
<body>

<h1>🚗 Pro Car Racing</h1>

<div class="info">
<div>Score: <span id="score">0</span></div>
<div>High: <span id="high">0</span></div>
</div>

<canvas id="game" width="400" height="600"></canvas>

<div class="controls">
<button onclick="moveLeft()">⬅️</button>
<button onclick="moveRight()">➡️</button>
</div>

<!-- Start Screen -->
<div id="startScreen">
<h2>🚗 Pro Car Racing</h2>
<button onclick="startGame()">Start Game</button>
</div>

<!-- Game Over Screen -->
<div id="gameOver">
<h2 id="finalScore"></h2>
<button onclick="restartGame()">Restart</button>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let keys = {};
document.addEventListener("keydown", e => keys[e.key] = true);
document.addEventListener("keyup", e => keys[e.key] = false);

let player = { x: 180, y: 500, w: 40, h: 60, speed: 5 };
let enemies = [];
let roadY = 0;

let score = 0;
let speed = 4;
let running = false;

let high = localStorage.getItem("carHigh") || 0;
document.getElementById("high").innerText = high;

// Start game
function startGame(){
    document.getElementById("startScreen").style.display = "none";
    running = true;
}

// Restart
function restartGame(){
    location.reload();
}

// Enemy spawn
function spawnEnemy() {
    let x = Math.floor(Math.random() * 360);
    enemies.push({ x, y: -60, w: 40, h: 60 });
}

// Road
function drawRoad() {
    ctx.fillStyle = "#333";
    ctx.fillRect(0,0,400,600);

    ctx.strokeStyle = "white";
    ctx.setLineDash([20,15]);
    ctx.lineDashOffset = -roadY;

    ctx.beginPath();
    ctx.moveTo(200,0);
    ctx.lineTo(200,600);
    ctx.stroke();

    ctx.setLineDash([]);
}

// Car
function drawCar(car, color) {
    ctx.fillStyle = color;
    ctx.fillRect(car.x, car.y, car.w, car.h);
}

// Collision
function collision(a,b){
    return (
        a.x < b.x + b.w &&
        a.x + a.w > b.x &&
        a.y < b.y + b.h &&
        a.y + a.h > b.y
    );
}

// Update
function update() {
    if(!running) return;

    // Keyboard control
    if(keys["ArrowLeft"] && player.x > 0) player.x -= player.speed;
    if(keys["ArrowRight"] && player.x < 360) player.x += player.speed;

    // Boundary control (important)
    if(player.x < 0) player.x = 0;
    if(player.x > 360) player.x = 360;

    roadY += speed;

    enemies.forEach(e => {
        e.y += speed;

        if(collision(player, e)) {
            running = false;

            if(score > high){
                localStorage.setItem("carHigh", score);
            }

            document.getElementById("gameOver").style.display = "flex";
            document.getElementById("finalScore").innerText = "Game Over 😢 Score: " + score;
        }
    });

    enemies = enemies.filter(e => e.y < 600);

    if(Math.random() < 0.03) spawnEnemy();

    score++;
    document.getElementById("score").innerText = score;

    if(score % 200 === 0) speed += 0.5;
}

// Draw
function draw() {
    drawRoad();
    drawCar(player, "lime");
    enemies.forEach(e => drawCar(e, "red"));
}

// Loop
function loop() {
    update();
    draw();
    requestAnimationFrame(loop);
}

// Mobile controls (FIXED)
function moveLeft(){
    if(player.x > 0){
        player.x -= player.speed * 5;
    }
}

function moveRight(){
    if(player.x < 360){
        player.x += player.speed * 5;
    }
}

loop();
</script>

</body>
</html>
