<!DOCTYPE html>
<html>
<head>
<title>News Gallery</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<header>
<h1>📰 Kamesh News Portal</h1>
</header>

<!-- Tabs -->
<div class="tabs">
<button onclick="showTab('home')">Home</button>
<button onclick="showTab('news')">News</button>
<button onclick="showTab('sports')">Sports</button>
<button onclick="showTab('tech')">Tech</button>
</div>

<!-- Home -->
<div id="home" class="tab-content">
<h2>Welcome</h2>
<p>Latest trending news and gallery</p>
</div>

<!-- News -->
<div id="news" class="tab-content">
<h2>Latest News</h2>
<p>Eid 2026 update, Weather news, LPG crisis...</p>
</div>

<!-- Sports -->
<div id="sports" class="tab-content">
<h2>Sports</h2>
<p>India won T20 World Cup 2026 🏆</p>
</div>

<!-- Tech -->
<div id="tech" class="tab-content">
<h2>Tech</h2>
<p>AI Summit 2026 and new innovations</p>
</div>

<script src="script.js"></script>

</body>
</html>
