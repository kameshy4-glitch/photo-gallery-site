<!DOCTYPE html>
<html>
<head>
<title>Mario Multi-Level Game</title>
<style>
body { margin:0; background:#111; text-align:center; }
canvas { background:skyblue; display:block; margin:auto; border:2px solid white; }
</style>
</head>
<body>

<canvas id="game" width="800" height="400"></canvas>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

// PLAYER
let player = {
    x:50, y:300, w:40, h:40,
    vx:0, vy:0,
    speed:5,
    gravity:1,
    jump:-15,
    onGround:false
};

// INPUT
let keys = {};
document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

// LEVEL DATA
let levels = [
    {
        platforms: [
            {x:0,y:350,w:800,h:50},
            {x:200,y:280,w:150,h:20},
            {x:400,y:220,w:150,h:20}
        ],
        coins: [
            {x:220,y:250},{x:420,y:190}
        ]
    },
    {
        platforms: [
            {x:0,y:350,w:800,h:50},
            {x:150,y:300,w:120,h:20},
            {x:350,y:250,w:120,h:20},
            {x:550,y:200,w:120,h:20}
        ],
        coins: [
            {x:170,y:270},{x:370,y:220},{x:570,y:170}
        ]
    }
];

let currentLevel = 0;
let platforms = [];
let coins = [];
let score = 0;

// LOAD LEVEL
function loadLevel(index){
    platforms = levels[index].platforms;
    coins = levels[index].coins.map(c => ({...c, r:10, collected:false}));
    player.x = 50;
    player.y = 300;
}

// UPDATE
function update(){
    player.vx = 0;
    if(keys["ArrowLeft"]) player.vx = -player.speed;
    if(keys["ArrowRight"]) player.vx = player.speed;

    player.x += player.vx;

    if(keys["Space"] && player.onGround){
        player.vy = player.jump;
    }

    player.vy += player.gravity;
    player.y += player.vy;

    player.onGround = false;

    // Collision
    platforms.forEach(p=>{
        if(player.x < p.x+p.w &&
           player.x+player.w > p.x &&
           player.y < p.y+p.h &&
           player.y+player.h > p.y){

            if(player.vy > 0){
                player.y = p.y - player.h;
                player.vy = 0;
                player.onGround = true;
            }
        }
    });

    // Coins
    let allCollected = true;

    coins.forEach(c=>{
        if(!c.collected){
            allCollected = false;
            if(player.x < c.x+c.r &&
               player.x+player.w > c.x &&
               player.y < c.y+c.r &&
               player.y+player.h > c.y){
                c.collected = true;
                score++;
            }
        }
    });

    // Next Level
    if(allCollected){
        currentLevel++;
        if(currentLevel < levels.length){
            loadLevel(currentLevel);
        } else {
            alert("Game Completed 🎉");
            currentLevel = 0;
            score = 0;
            loadLevel(0);
        }
    }
}

// DRAW
function draw(){
    ctx.clearRect(0,0,800,400);

    // Platforms
    ctx.fillStyle="green";
    platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

    // Coins
    ctx.fillStyle="gold";
    coins.forEach(c=>{
        if(!c.collected){
            ctx.beginPath();
            ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
            ctx.fill();
        }
    });

    // Player
    ctx.fillStyle="red";
    ctx.fillRect(player.x,player.y,player.w,player.h);

    // UI
    ctx.fillStyle="black";
    ctx.font="18px Arial";
    ctx.fillText("Score: "+score,10,20);
    ctx.fillText("Level: "+(currentLevel+1),10,40);
}

// LOOP
function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

// START
loadLevel(0);
gameLoop();
</script>

</body>
</html>
