<!DOCTYPE html>
<html>
<head>
<title>Angry Bird Style Game</title>

<style>
body {
margin: 0;
background: skyblue;
display: flex;
flex-direction: column;
align-items: center;
font-family: Arial;
}

h1 {
margin: 10px;
}

canvas {
background: lightgreen;
border: 2px solid black;
}
</style>

</head>
<body>

<h1>🐦 Angry Bird Style Game</h1>
<canvas id="game" width="600" height="400"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

let bird = {x: 50, y: 300, radius: 15, vx: 0, vy: 0};
let target = {x: 500, y: 300, w: 40, h: 40};
let gravity = 0.5;
let launched = false;

canvas.addEventListener("click", () => {
    if (!launched) {
        bird.vx = 8;
        bird.vy = -10;
        launched = true;
    }
});

function draw() {
    ctx.clearRect(0,0,600,400);

    // bird
    ctx.beginPath();
    ctx.arc(bird.x, bird.y, bird.radius, 0, Math.PI*2);
    ctx.fillStyle = "red";
    ctx.fill();

    // target
    ctx.fillStyle = "brown";
    ctx.fillRect(target.x, target.y, target.w, target.h);
}

function update() {
    if (launched) {
        bird.vy += gravity;
        bird.x += bird.vx;
        bird.y += bird.vy;
    }

    // collision
    if (
        bird.x > target.x &&
        bird.x < target.x + target.w &&
        bird.y > target.y &&
        bird.y < target.y + target.h
    ) {
        alert("Hit! 🎯");
        resetGame();
    }

    // ground
    if (bird.y > 350) {
        resetGame();
    }
}

function resetGame() {
    bird.x = 50;
    bird.y = 300;
    bird.vx = 0;
    bird.vy = 0;
    launched = false;
}

function gameLoop() {
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
