<!DOCTYPE html>
<html>
<head>
<title>Mario Fun Game - Kamesh</title>
<style>
body { margin:0; background:#111; text-align:center; }
canvas { background:skyblue; display:block; margin:auto; border:2px solid white; }
</style>
</head>
<body>

<canvas id="game" width="800" height="400"></canvas>

<script>
let canvas = document.getElementById("game");
let ctx = canvas.getContext("2d");

// PLAYER
let player = {
    x:100, y:300, w:40, h:40,
    vx:0, vy:0,
    speed:5,
    gravity:1,
    jump:-15,
    onGround:false
};

// INPUT
let keys = {};
document.addEventListener("keydown", e => keys[e.code] = true);
document.addEventListener("keyup", e => keys[e.code] = false);

// PLATFORMS
let platforms = [
    {x:0,y:350,w:800,h:50},
    {x:200,y:280,w:150,h:20},
    {x:400,y:220,w:150,h:20},
    {x:600,y:160,w:150,h:20}
];

// COINS
let coins = [
    {x:230,y:250,r:10, collected:false},
    {x:430,y:190,r:10, collected:false},
    {x:630,y:130,r:10, collected:false}
];

let score = 0;

// UPDATE
function update(){

    // Movement
    player.vx = 0;
    if(keys["ArrowLeft"]) player.vx = -player.speed;
    if(keys["ArrowRight"]) player.vx = player.speed;

    player.x += player.vx;

    // Jump
    if(keys["Space"] && player.onGround){
        player.vy = player.jump;
    }

    // Gravity
    player.vy += player.gravity;
    player.y += player.vy;

    player.onGround = false;

    // Platform collision
    platforms.forEach(p => {
        if(player.x < p.x+p.w &&
           player.x+player.w > p.x &&
           player.y < p.y+p.h &&
           player.y+player.h > p.y){

            if(player.vy > 0){
                player.y = p.y - player.h;
                player.vy = 0;
                player.onGround = true;
            }
        }
    });

    // Coin collision
    coins.forEach(c => {
        if(!c.collected &&
           player.x < c.x + c.r &&
           player.x + player.w > c.x &&
           player.y < c.y + c.r &&
           player.y + player.h > c.y){
            c.collected = true;
            score++;
        }
    });
}

// DRAW
function draw(){
    ctx.clearRect(0,0,800,400);

    // platforms
    ctx.fillStyle="green";
    platforms.forEach(p=>ctx.fillRect(p.x,p.y,p.w,p.h));

    // coins
    ctx.fillStyle="gold";
    coins.forEach(c=>{
        if(!c.collected){
            ctx.beginPath();
            ctx.arc(c.x,c.y,c.r,0,Math.PI*2);
            ctx.fill();
        }
    });

    // player
    ctx.fillStyle="red";
    ctx.fillRect(player.x,player.y,player.w,player.h);

    // score
    ctx.fillStyle="black";
    ctx.font="20px Arial";
    ctx.fillText("Score: "+score,10,20);
}

// LOOP
function gameLoop(){
    update();
    draw();
    requestAnimationFrame(gameLoop);
}

gameLoop();
</script>

</body>
</html>
